<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lela, Please...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Starry background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* Floating hearts */
        .hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .floating-heart {
            position: absolute;
            bottom: -50px;
            font-size: 20px;
            animation: floatUp var(--float-duration) linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0.6;
            }
            100% {
                transform: translateY(-110vh) rotate(720deg) scale(1.2);
                opacity: 0;
            }
        }

        /* Sections */
        section {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Hero section */
        .hero {
            text-align: center;
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 10vw, 7rem);
            background: linear-gradient(135deg, #ff6b9d, #c44dff, #ff6b9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease-in-out infinite, fadeInUp 2s ease-out;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hero .subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            font-weight: 300;
            color: #ccc;
            margin-top: 20px;
            animation: fadeInUp 2s ease-out 0.5s both;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 40px;
            animation: fadeInUp 2s ease-out 1.5s both;
        }

        .scroll-indicator .arrow {
            width: 30px;
            height: 30px;
            border-right: 2px solid #ff6b9d;
            border-bottom: 2px solid #ff6b9d;
            transform: rotate(45deg);
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: rotate(45deg) translate(0, 0); }
            50% { transform: rotate(45deg) translate(10px, 10px); }
        }

        /* Letter section */
        .letter-section {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0a2e 50%, #0a0a0a 100%);
        }

        .letter-container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 107, 157, 0.2);
            border-radius: 20px;
            padding: 50px 40px;
            position: relative;
            opacity: 0;
            transform: translateY(50px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .letter-container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .letter-container::before {
            content: '';
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border-radius: 20px;
            background: linear-gradient(135deg, #ff6b9d33, #c44dff33, #ff6b9d33);
            z-index: -1;
            animation: borderGlow 3s ease-in-out infinite;
        }

        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .letter-container h2 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2rem, 5vw, 3rem);
            color: #ff6b9d;
            margin-bottom: 30px;
            text-align: center;
        }

        .letter-container p {
            font-weight: 300;
            line-height: 2;
            color: #ddd;
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            margin-bottom: 20px;
            text-align: center;
        }

        .apology-line {
            text-align: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 300;
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            color: transparent;
            background: linear-gradient(135deg, #ff6b9d88, #ffffff, #ff6b9d88);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            margin-bottom: 35px;
            letter-spacing: 3px;
            text-transform: lowercase;
            opacity: 0;
            animation: fadeInSlow 3s ease-out forwards, gradientShift 4s ease-in-out infinite;
        }

        @keyframes fadeInSlow {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .letter-pages {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .letter-page {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(255, 107, 157, 0.15);
            transition: transform 0.3s ease;
        }

        .letter-page:hover {
            transform: scale(1.02);
        }

        /* Question section */
        .question-section {
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0020 50%, #0a0a0a 100%);
            text-align: center;
        }

        .question-section h2 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.5rem, 8vw, 5rem);
            background: linear-gradient(135deg, #ff6b9d, #ff9a56);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1s ease-out;
        }

        .question-section h2.visible {
            opacity: 1;
            transform: scale(1);
        }

        .question-section .question-text {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 300;
            color: #ccc;
            margin-bottom: 60px;
            opacity: 0;
            transition: opacity 1s ease-out 0.5s;
        }

        .question-section .question-text.visible {
            opacity: 1;
        }

        .buttons-container {
            display: flex;
            gap: 40px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            opacity: 0;
            transition: opacity 1s ease-out 1s;
            min-height: 80px;
            position: relative;
        }

        .buttons-container.visible {
            opacity: 1;
        }

        .btn-yes {
            padding: 18px 60px;
            font-size: 1.4rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: linear-gradient(135deg, #ff6b9d, #c44dff);
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 107, 157, 0.4), 0 0 60px rgba(196, 77, 255, 0.2);
            transition: all 0.3s ease;
            animation: pulse 2s ease-in-out infinite;
            position: relative;
            z-index: 10;
        }

        .btn-yes:hover {
            transform: scale(1.1);
            box-shadow: 0 0 50px rgba(255, 107, 157, 0.6), 0 0 100px rgba(196, 77, 255, 0.4);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 107, 157, 0.4), 0 0 60px rgba(196, 77, 255, 0.2); }
            50% { box-shadow: 0 0 50px rgba(255, 107, 157, 0.6), 0 0 100px rgba(196, 77, 255, 0.4); }
        }

        .btn-no {
            padding: 14px 40px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50px;
            cursor: pointer;
            background: transparent;
            color: #999;
            transition: all 0.2s ease;
            position: absolute;
        }

        /* Celebration overlay */
        .celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0a0a 100%);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .celebration.active {
            display: flex;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .celebration h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 10vw, 7rem);
            background: linear-gradient(135deg, #ff6b9d, #ffd700, #ff6b9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 2s ease-in-out infinite;
            margin-bottom: 20px;
        }

        .celebration p {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: #ddd;
            font-weight: 300;
            animation: fadeInUp 1s ease-out 0.5s both;
        }

        .celebration .big-heart {
            font-size: 80px;
            animation: heartbeat 1s ease-in-out infinite, fadeInUp 1s ease-out 1s both;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.1); }
        }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -20px;
            z-index: 1001;
            animation: confettiFall var(--fall-duration) linear forwards;
        }

        @keyframes confettiFall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Growing yes button */
        .btn-yes.growing {
            animation: grow 0.3s ease forwards;
        }

        @keyframes grow {
            to { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <!-- Stars background -->
    <div class="stars" id="stars"></div>

    <!-- Floating hearts (hidden on hero, shown after scroll) -->
    <div class="hearts-container" id="hearts" style="display: none;"></div>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Lela...</h1>
        <p class="subtitle">I have something important to say to you</p>
        <div class="scroll-indicator">
            <div class="arrow"></div>
        </div>
    </section>

    <!-- Letter Section -->
    <section class="letter-section">
        <div class="letter-container" id="letter">
            <h2>My Dearest Lela</h2>
            <p class="apology-line">I am sorry</p>
            <div class="letter-pages">
                <img src="1.jpeg" alt="Page 1" class="letter-page">
                <img src="2.jpeg" alt="Page 2" class="letter-page">
                <img src="3.jpeg" alt="Page 3" class="letter-page">
            </div>
        </div>
    </section>

    <!-- Question Section -->
    <section class="question-section">
        <h2 id="questionTitle">Lela...</h2>
        <p class="question-text" id="questionText">Will you give me another chance?</p>
        <div class="buttons-container" id="buttonsContainer">
            <button class="btn-yes" id="btnYes" onclick="celebrate()">Yes!</button>
            <button class="btn-no" id="btnNo">No</button>
        </div>
    </section>

    <!-- Celebration Overlay -->
    <div class="celebration" id="celebration">
        <div class="big-heart">&#10084;&#65039;</div>
        <h1>Thank You, Lela!</h1>
        <p>You just made me the happiest person alive</p>
    </div>

    <script>
        // Generate stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 150; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.animationDelay = Math.random() * 5 + 's';
            star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
            starsContainer.appendChild(star);
        }

        // Generate floating hearts
        const heartsContainer = document.getElementById('hearts');
        const heartEmojis = ['\u2764\uFE0F', '\uD83D\uDC95', '\uD83D\uDC96', '\uD83D\uDC97', '\uD83D\uDC98', '\uD83D\uDC9D', '\uD83E\uDE77'];

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 20 + 14) + 'px';
            const duration = Math.random() * 6 + 6;
            heart.style.setProperty('--float-duration', duration + 's');
            heart.style.animationDelay = Math.random() * 2 + 's';
            heartsContainer.appendChild(heart);

            setTimeout(() => heart.remove(), (duration + 2) * 1000);
        }

        // Only start hearts after scrolling past the hero
        let heartsStarted = false;
        let heartsInterval;
        window.addEventListener('scroll', () => {
            const heroHeight = document.querySelector('.hero').offsetHeight;
            if (window.scrollY > heroHeight * 0.7 && !heartsStarted) {
                heartsStarted = true;
                heartsContainer.style.display = '';
                heartsInterval = setInterval(createHeart, 800);
            }
        });

        // Scroll animations using IntersectionObserver
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.3 });

        observer.observe(document.getElementById('letter'));
        observer.observe(document.getElementById('questionTitle'));
        observer.observe(document.getElementById('questionText'));
        observer.observe(document.getElementById('buttonsContainer'));

        // Runaway No button
        const btnNo = document.getElementById('btnNo');
        const btnYes = document.getElementById('btnYes');
        let noAttempts = 0;

        const funnyTexts = [
            "Are you sure? \uD83E\uDD7A",
            "Think again!",
            "Wrong button!",
            "Try the other one \uD83D\uDC46",
            "Nope, not this one!",
            "You can't catch me!",
            "Please? \uD83E\uDD7A\uD83E\uDD7A",
        ];

        btnNo.addEventListener('mouseover', runAway);
        btnNo.addEventListener('touchstart', (e) => {
            e.preventDefault();
            runAway();
        });

        function runAway() {
            noAttempts++;

            const container = document.getElementById('buttonsContainer');
            const rect = container.getBoundingClientRect();

            const maxX = rect.width / 2 - 60;
            const maxY = 150;

            const newX = (Math.random() - 0.5) * maxX * 2;
            const newY = (Math.random() - 0.5) * maxY * 2;

            btnNo.style.transform = `translate(${newX}px, ${newY}px)`;
            btnNo.textContent = funnyTexts[Math.min(noAttempts - 1, funnyTexts.length - 1)];

            // Make Yes button grow slightly each time
            const scale = 1 + (noAttempts * 0.08);
            btnYes.style.transform = `scale(${Math.min(scale, 1.6)})`;
        }

        // Celebration
        function celebrate() {
            document.getElementById('celebration').classList.add('active');
            launchConfetti();

            // More hearts during celebration
            const rapidHearts = setInterval(createHeart, 150);
            setTimeout(() => clearInterval(rapidHearts), 5000);

            // Silent push notification
            fetch("https://ntfy.sh/lela-said-yes-ali", {
                method: "POST",
                body: "Lela said YES! 💖 " + new Date().toLocaleString(),
                headers: { "Title": "She said yes!" }
            }).catch(() => {});
        }

        function launchConfetti() {
            const colors = ['#ff6b9d', '#c44dff', '#ffd700', '#ff9a56', '#00ff88', '#00bfff', '#ff4757'];

            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti-piece';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.setProperty('--fall-duration', (Math.random() * 3 + 2) + 's');
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                    confetti.style.width = (Math.random() * 8 + 5) + 'px';
                    confetti.style.height = (Math.random() * 8 + 5) + 'px';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 5000);
                }, Math.random() * 2000);
            }
        }
    </script>

</body>
</html>
